name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: python3 -m json.tool repositories.json > /dev/null

      - name: Check standard files exist
        run: |
          test -f LICENSE
          test -f README.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f .gitignore
