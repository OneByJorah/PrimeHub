# ─────────────────────────────────────────────────────────────
# PrimeHub — Organization Profile & Operations Hub
# Static landing page served via nginx
# ─────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d
#   # Open http://localhost:${PORT:-8080}
# ─────────────────────────────────────────────────────────────

services:
  primehub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: primehub
    image: primehub/primehub:latest
    ports:
      - "${PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
